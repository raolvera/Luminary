<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Form</title>
</head>
<body>
<!-- Hidden form for Netlify detection -->
<form name="reservations" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="reservations" />
  <input name="bot-field" />
  <label>Name <input type="text" name="name" /></label>
  <label>Email <input type="email" name="email" /></label>
  <label>Date <input type="date" name="date" /></label>
  <label>Time <input type="text" name="time" /></label>
  <label>Guests <input type="text" name="guests" /></label>
  <label>Phone <input type="tel" name="phone" /></label>
  <label>Notes <textarea name="notes"></textarea></label>
</form>
</body>
</html>
